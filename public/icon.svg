<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#8b5cf6" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- Grid Pattern -->
  <g opacity="0.1">
    <line x1="0" y1="64" x2="512" y2="64" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="white" stroke-width="1"/>
    <line x1="64" y1="0" x2="64" y2="512" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="white" stroke-width="1"/>
  </g>
  
  <!-- Lightning Bolt -->
  <g filter="url(#shadow)">
    <path d="M280 80 L160 260 L240 260 L200 432 L360 220 L280 220 L320 80 Z" 
          fill="url(#glow)" stroke="white" stroke-width="4" stroke-linejoin="round"/>
  </g>
  
  <!-- Orbit Ring -->
  <ellipse cx="256" cy="256" rx="200" ry="60" fill="none" stroke="white" stroke-width="3" opacity="0.3" transform="rotate(-30, 256, 256)"/>
  
  <!-- Dots -->
  <circle cx="120" cy="180" r="6" fill="white" opacity="0.6"/>
  <circle cx="392" cy="332" r="6" fill="white" opacity="0.6"/>
  <circle cx="256" cy="100" r="4" fill="white" opacity="0.4"/>
  <circle cx="400" cy="256" r="4" fill="white" opacity="0.4"/>
  <circle cx="112" cy="320" r="4" fill="white" opacity="0.4"/>
</svg>
