appId: com.ragstudio.pro
productName: RAG Studio Pro
directories:
  output: dist-electron
files:
  - dist/**/*
  - electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: public/icon.png
  sign: false
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: RAG Studio Pro
  artifactName: "RAGStudioPro-Setup-${version}.${ext}"
portable:
  artifactName: "RAGStudioPro-${version}-Portable.${ext}"
forceCodeSigning: false
publish:
  provider: github
  owner: rag-studio-pro
  repo: rag-studio-pro
